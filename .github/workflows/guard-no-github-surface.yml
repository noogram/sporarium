# R1' structural guard — fails the build if the GitHub-issues wire is reconnected.
#
# WHY: delib-20260721-f0b1 verdict "sever the capability, don't gate the act."
# sporarium must never auto-publish internal molecule IDs to its public GitHub
# tracker. A tombstone comment is an intention; this CI job is the lock.
# Full rationale in the header of scripts/guard-no-github-surface.sh.
name: guard-no-github-surface

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run the R1' no-github-surface guard
        # GITHUB_TOKEN is intentionally NOT passed: the guard needs no
        # write capability, and withholding it keeps CI itself incapable
        # of publishing an issue — capability severed, not merely gated.
        run: bash scripts/guard-no-github-surface.sh

formula = "task-work-reasoning"
version = 1
description = """
Execute a concrete task on a DEEP-REASONING model pin.

Identical in shape to `task-work` (implement -> verify), but every step
pins `model = "claude-fable-5"`. This is the ONLY in-zip channel that
carries a per-node model allocation onto a recipient machine: a spore
node has no `model` field, and the spore->nucleate path drops `--model`,
so the allocation must travel on the FORMULA STEP. cosmon honors a
per-step model pin, which ranks below an explicit `--model` / the
`ANTHROPIC_MODEL` env override and above every default. Bind the nodes
whose value is depth of reasoning to this formula: proof attempts, the
skeptic, the red-team corpus, the editorial adversary, the opening
decomposition.

GRACEFUL DEGRADATION: the pin is inert until the molecule is TACKLED
(germination and `cs spore validate` never touch it). A recipient who
lacks `claude-fable-5` overrides it per-molecule with
`cs tackle <id> --model <their-model>` or globally by exporting
`ANTHROPIC_MODEL=<their-model>` before the run — both rank ABOVE this
pin, so the DAG is unchanged and only the realized model differs. See
README "Model access".
"""
id_prefix = "task"

[vars.topic]
description = "The concrete task to execute, stated in one or more sentences."
required = true

# Tier 0 — leaf formula, no child nucleation.
[tier]
level = 0

[[steps]]
id = "implement"
title = "Implement the solution"
description = "Do the work. Read the project's CLAUDE.md for conventions."
acceptance = "Implementation complete, the leg's artifact emitted"
model = "claude-fable-5"

[[steps]]
id = "verify"
title = "Verify and validate"
description = """
Verify the leg's artifact against its brief: internally consistent, every
claim justified or flagged as a gap, sources cited where applicable. If
the leg emitted code, run the project's gates (build / test / lint /
format / doc). Fix any issues.
"""
needs = ["implement"]
acceptance = "Artifact verified against its brief; gates (if code) green"
model = "claude-fable-5"

\* ==========================================================================
\* spore.cfg — TLC model for spore.tla (the math-attack seal).
\*
\* LAUNCH (from inside spores/math-attack/, any Java 11+ on PATH). The jar ships
\* in the cosmon repo at docs/specs/tla2tools.jar — point TLA2TOOLS_JAR at it:
\*   export TLA2TOOLS_JAR=/path/to/cosmon/docs/specs/tla2tools.jar
\*   java -XX:+UseParallelGC -cp "$TLA2TOOLS_JAR" tlc2.TLC \
\*        -workers auto -config spore.cfg spore.tla
\*
\* EXPECTED VERDICT: "Model checking completed. No error has been found."
\* STATE SPACE: recomputed for v3.2 (+trace root, split evidence/citation gates,
\* +ArtifactFlow invariant): ~1050 distinct states (2636 generated), depth 23.
\*
\* MODEL SIZES (rationale):
\*   - Subquestions = {"sq1", "sq2"}: two fan-out targets — the SMALLEST model
\*     that gives NoResourceCollision teeth (proof_attempt-sq1 must stay disjoint
\*     from proof_attempt-sq2).
\*   - Observability = {"obs1"}: the ON case (the sentinel one-element list the
\*     spore uses for `--var observability=on`), exercising the instrumentation
\*     sub-DAG (collector -> dataviz -> narrator) and its NoResourceCollision by
\*     role. The OFF case (Observability = {}) is the strictly SMALLER sub-model:
\*     it removes those nodes and can neither introduce a collision nor bypass a
\*     gate, so every property holds a fortiori (honest boundary — the seal is
\*     checked against the richer ON world). Together:
\*     |Nodes| = 15 + 2*|Subquestions| + 3*|Observability| = 15 + 4 + 3 = 22.
\*   - NULL = NoSq: a model value distinct from every subquestion and every
\*     observability stage; the sq slot of a fixed (non-fan-out) node.
\*   - backend is a STATE variable (chosen at Init), so this single model covers
\*     BOTH formal_backend = "lean" (kernel leg pass/fail/absent, evidence PASS
\*     reachable) AND "none" (kernel leg DEGRADED). No second config needed.
\*
\* No SYMMETRY: Termination is a liveness property and TLC refuses symmetry on
\* temporal properties.
\*
\* CHECK_DEADLOCK FALSE: a fully-drained DAG (every node Done) is the intended
\* terminal absorbing state, not a deadlock bug. Termination is checked as the
\* liveness PROPERTY instead.
\* ==========================================================================

SPECIFICATION Spec

CONSTANTS
    Subquestions  = {"sq1", "sq2"}
    Observability = {"obs1"}
    NULL          = NoSq

INVARIANT
    SealInvariant

PROPERTY
    Termination

CHECK_DEADLOCK FALSE

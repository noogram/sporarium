\* ==========================================================================
\* spore.cfg — TLC model for spore.tla (the math-attack seal).
\*
\* LAUNCH (from inside spores/math-attack/, any Java 11+ on PATH). The jar ships
\* in the cosmon repo at docs/specs/tla2tools.jar — point TLA2TOOLS_JAR at it:
\*   export TLA2TOOLS_JAR=/path/to/cosmon/docs/specs/tla2tools.jar
\*   java -XX:+UseParallelGC -cp "$TLA2TOOLS_JAR" tlc2.TLC \
\*        -workers auto -config spore.cfg spore.tla
\*
\* EXPECTED VERDICT: "Model checking completed. No error has been found."
\* STATE SPACE: MEASURED for v4 (+re_attack bounded round counter, +reattack_v
\* fold, +written_rounds, +2 GateFailClosed clauses) on OpenJDK 26.0.1 /
\* TLC 2026.04.18, all figures from real runs:
\*   this config (MaxRounds = 3, Observability = {"obs1"}):
\*       1382 distinct states (4061 generated), depth 27.
\*   the shipment-gate bound (MaxRounds = 5, everything else identical):
\*       1570 distinct states (4947 generated), depth 29 — green.
\*       Growth is ~94 distinct states per extra round: the loop adds ONE bounded
\*       scalar dimension, not a topology multiplier. Comfortably inside TLC.
\*   observability OFF (MaxRounds = 3, Observability = {}):
\*       1112 distinct states (3656 generated) — green, the strictly smaller world.
\* v3.2, for comparison: ~1050 distinct (2636 generated), depth 23.
\*
\* NON-VACUITY (the loop is exercised, not silently dead). Each state below was
\* confirmed REACHABLE by running the model with its negation as an invariant and
\* observing the violation:
\*   * reattack_v = "EXHAUSTED"                     (the cap path exists)
\*   * reattack_v = "PROVED_CLEAN"                  (the fixpoint path exists)
\*   * round = MaxRounds                            (the loop really advances)
\*   * PROVED_CLEAN with round < MaxRounds          (RUNTIME EARLY EXIT exists)
\*   * PROVED_CLEAN with round = 0                  (the `rounds=1` dormant fold)
\*   * editorial = "SHIP"                           (no v3.2 regression)
\*   * EXHAUSTED with evidence DEGRADED             (backend="none" compat path)
\*   * EXHAUSTED with evidence BLOCKED              (block-and-escalate at the cap)
\*
\* NEGATIVE TESTS (the properties have teeth — each mutation was run and REJECTED):
\*   * loop folds PROVED_CLEAN on the kernel alone, skeptic ignored  => VIOLATED
\*   * rounds drop the round index from their artifact path          => VIOLATED
\*   * the loop counter may advance past the sealed bound            => VIOLATED
\*   * evidence_gate re-wired to bypass the loop (v3.2 wiring)       => VIOLATED
\*                                                     (caught by ArtifactFlow)
\* One clause is honestly REDUNDANT: deleting EvidenceDecision's `rv = "NONE"`
\* fail-closed branch leaves TLC green, because the blocked-by edge already makes
\* an unfolded loop unreachable at the gate. It is kept as a statement of intent,
\* not counted as a proof. See the note above UnfoldedLoopNeverPromotes.
\*
\* MODEL SIZES (rationale):
\*   - Subquestions = {"sq1", "sq2"}: two fan-out targets — the SMALLEST model
\*     that gives NoResourceCollision teeth (proof_attempt-sq1 must stay disjoint
\*     from proof_attempt-sq2).
\*   - Observability = {"obs1"}: the ON case (the sentinel one-element list the
\*     spore uses for `--var observability=on`), exercising the instrumentation
\*     sub-DAG (collector -> dataviz -> narrator) and its NoResourceCollision by
\*     role. The OFF case (Observability = {}) is the strictly SMALLER sub-model:
\*     it removes those nodes and can neither introduce a collision nor bypass a
\*     gate, so every property holds a fortiori (honest boundary — the seal is
\*     checked against the richer ON world). Together:
\*     |Nodes| = 16 + 2*|Subquestions| + 3*|Observability| = 16 + 4 + 3 = 23.
\*   - MaxRounds = 3 (v4): the SMALLEST bound that exercises the re-attack loop as
\*     a real machine — round 1 (not converged), round 2 (not converged), round 3
\*     (the MaxRounds exhaustion => reattack_v = EXHAUSTED), AND the clean fixpoint
\*     reachable at any round, INCLUDING at round 0 (the `rounds = 1` default,
\*     where the loop nucleates nothing and folds over round 1's own legs). A
\*     bound of 1 would collapse the loop; 3 gives the exhaustion path and the
\*     fixpoint path distinct depths. MaxRounds sits here as a POSTURE for the
\*     model — it bounds the loop counter, it is NOT a node-set multiplier — so
\*     larger bounds (up to the spore's max_instances = 5 structural ceiling, and
\*     beyond) hold A FORTIORI: the loop variant only grows the cap, never the
\*     topology. This is why the modeled MaxRounds need not equal the spore's
\*     max_instances literal, and it is the same a-fortiori argument this file
\*     already makes for the observability-off world.
\*   - NULL = NoSq: a model value distinct from every subquestion and every
\*     observability stage; the sq slot of a fixed (non-fan-out) node.
\*   - backend is a STATE variable (chosen at Init), so this single model covers
\*     BOTH formal_backend = "lean" (kernel leg pass/fail/absent, evidence PASS
\*     reachable) AND "none" (kernel leg DEGRADED). No second config needed.
\*
\* No SYMMETRY: Termination is a liveness property and TLC refuses symmetry on
\* temporal properties.
\*
\* CHECK_DEADLOCK FALSE: a fully-drained DAG (every node Done) is the intended
\* terminal absorbing state, not a deadlock bug. Termination is checked as the
\* liveness PROPERTY instead.
\* ==========================================================================

SPECIFICATION Spec

CONSTANTS
    Subquestions  = {"sq1", "sq2"}
    Observability = {"obs1"}
    MaxRounds     = 3
    NULL          = NoSq

INVARIANT
    SealInvariant

PROPERTY
    Termination

CHECK_DEADLOCK FALSE

\* ==========================================================================
\* spore_starter.cfg — TLC model for spore_starter.tla (the math-attack STARTER
\* lane seal, v3.2). A 4-node linear chain; |Nodes| = |Roles| = 4.
\*
\* LAUNCH (from inside spores/math-attack/, any Java 11+ on PATH). The jar ships
\* in the cosmon repo at docs/specs/tla2tools.jar — point TLA2TOOLS_JAR at it:
\*   export TLA2TOOLS_JAR=/path/to/cosmon/docs/specs/tla2tools.jar
\*   java -XX:+UseParallelGC -cp "$TLA2TOOLS_JAR" tlc2.TLC \
\*        -workers auto -config spore_starter.cfg spore_starter.tla
\*
\* EXPECTED VERDICT: "Model checking completed. No error has been found."
\* No GateFailClosed here — the starter lane has no promotion gate (honest
\* boundary). Termination + NoResourceCollision + DeterministicParametrization
\* + ArtifactFlow only.
\*
\* CHECK_DEADLOCK FALSE: the fully-drained 4-node chain is the intended terminal
\* absorbing state, not a deadlock.
\* ==========================================================================

SPECIFICATION Spec

CONSTANTS
    NULL = NoSq

INVARIANT
    SealInvariant

PROPERTY
    Termination

CHECK_DEADLOCK FALSE
